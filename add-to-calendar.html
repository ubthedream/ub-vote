<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VOTE UB THE DREAM — Add to Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue: #005bbb;
      --gold: #f5c518;
      --dark: #0a0a0f;
      --white: #f8f8f2;
      --card: #13131a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,91,187,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(245,197,24,0.15) 0%, transparent 55%);
      pointer-events: none;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: var(--gold);
      color: var(--dark);
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 0.35rem 0.9rem;
      border-radius: 2px;
      margin-bottom: 1.4rem;
      animation: fadeDown 0.6s ease both;
    }

    h1 {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2rem, 8vw, 3rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--white);
      margin-bottom: 0.5rem;
      animation: fadeDown 0.7s ease both;
    }

    h1 span {
      color: var(--gold);
    }

    .subtitle {
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(248,248,242,0.5);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 2.2rem;
      animation: fadeDown 0.8s ease both;
    }

    .event-card {
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 2rem;
      text-align: left;
      animation: fadeDown 0.9s ease both;
    }

    .event-card .row {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-bottom: 0.65rem;
    }

    .event-card .row:last-child { margin-bottom: 0; }

    .event-card .icon {
      font-size: 1rem;
      margin-top: 2px;
      flex-shrink: 0;
    }

    .event-card .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 0.1rem;
    }

    .event-card .value {
      font-size: 0.88rem;
      color: var(--white);
      font-weight: 500;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      animation: fadeUp 1s ease both;
    }

    .cal-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 1.4rem;
      border-radius: 10px;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      cursor: pointer;
      border: none;
    }

    .cal-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.4);
      filter: brightness(1.08);
    }

    .cal-btn:active { transform: translateY(0); }

    .cal-btn .btn-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .cal-btn .btn-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .cal-btn .arrow { font-size: 1.1rem; opacity: 0.6; }

    .btn-google {
      background: #fff;
      color: #1a1a1a;
    }

    .btn-apple {
      background: #1c1c1e;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
    }

    .btn-outlook {
      background: #0078d4;
      color: #fff;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.72rem;
      color: rgba(248,248,242,0.25);
      letter-spacing: 0.05em;
      animation: fadeUp 1.1s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="container">
    <div class="badge">📅 Save the Date</div>
    <h1>VOTE UB<br/><span>THE DREAM</span></h1>
    <p class="subtitle">Bring Back Spring Fest &amp; World Class Clubs</p>

    <div class="event-card">
      <div class="row">
        <span class="icon">🗓</span>
        <div>
          <div class="label">Date</div>
          <div class="value">March 30 – April 3, 2026</div>
        </div>
      </div>
      <div class="row">
        <span class="icon">⏰</span>
        <div>
          <div class="label">Time</div>
          <div class="value">9:00 AM – 4:00 PM</div>
        </div>
      </div>
      <div class="row">
        <span class="icon">📍</span>
        <div>
          <div class="label">Location</div>
          <div class="value">UBLINKED</div>
        </div>
      </div>
    </div>

    <div class="buttons">
      <!-- Google Calendar -->
      <a class="cal-btn btn-google"
        href="https://calendar.google.com/calendar/render?action=TEMPLATE&text=VOTE+UB+THE+DREAM-+UBLINKED&dates=20260330T090000/20260403T160000&details=VOTE+UB+THE+DREAM-BRING+BACK+SPRING+FEST+%26+WORLD+CLASS+CLUBS&location=UBLINKED"
        target="_blank" rel="noopener">
        <div class="btn-left">
          <div class="btn-logo">📅</div>
          Google Calendar
        </div>
        <span class="arrow">→</span>
      </a>

      <!-- Apple Calendar (.ics download) -->
      <a class="cal-btn btn-apple"
        href="VOTE_UB_THE_DREAM.ics"
        download="VOTE_UB_THE_DREAM.ics">
        <div class="btn-left">
          <div class="btn-logo">🍎</div>
          Apple Calendar
        </div>
        <span class="arrow">→</span>
      </a>

      <!-- Outlook -->
      <a class="cal-btn btn-outlook"
        href="https://outlook.live.com/calendar/0/deeplink/compose?subject=VOTE+UB+THE+DREAM-+UBLINKED&startdt=2026-03-30T09:00:00&enddt=2026-04-03T16:00:00&body=VOTE+UB+THE+DREAM-BRING+BACK+SPRING+FEST+%26+WORLD+CLASS+CLUBS&location=UBLINKED"
        target="_blank" rel="noopener">
        <div class="btn-left">
          <div class="btn-logo">📧</div>
          Outlook Calendar
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <p class="footer">UBLINKED · UB Student Association · 2026</p>
  </div>
</body>
</html>
